name: Reusable Terraform

on:
  workflow_call:
    inputs:
      project:
        required: true
        type: string

      environment:
        required: true
        type: string

      aws_region:
        required: true
        type: string

      role_arn:
        required: true
        type: string

      tf_version:
        required: true
        type: string

permissions:
  id-token: write
  contents: read

jobs:
  lint: 
    name: Lint
    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash
        working-directory: stacks/${{ inputs.project }}/${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.tf_version }}

      - uses: terraform-linters/setup-tflint@v4

      - name: Format Check
        run: terraform fmt -check -recursive

      - name: TFLint Init
        run: tflint --init

      - name: TFLint
        run: tflint --recursive

  security: 
    name: Security
    runs-on: ubuntu-latest
    needs: lint

    defaults:
      run:
        shell: bash
        working-directory: stacks/${{ inputs.project }}/${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.tf_version }}

      - name: Trivy Scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          scan-type: config
          severity: HIGH,CRITICAL
          exit-code: "1"

  validate: 
    name: Validate
    runs-on: ubuntu-latest
    needs: security

    defaults:
      run:
        shell: bash
        working-directory: stacks/${{ inputs.project }}/${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.tf_version }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.role_arn }}

      - name: Terraform Init
        run: terraform init

      - name: Validate
        run: terraform validate

  plan:
    name: Plan
    runs-on: ubuntu-latest
    needs: validate

    defaults:
      run:
        shell: bash
        working-directory: stacks/${{ inputs.project }}/${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.tf_version }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.role_arn }}

      - name: Terraform Init
        run: terraform init

      - name: Terraform Plan
        run: terraform plan -out=tfplan

      - name: Upload Plan
        uses: actions/upload-artifact@v4
        with:
          name: tfplan-${{ inputs.project }}-${{ inputs.environment }}
          path: stacks/${{ inputs.project }}/${{ inputs.environment }}/tfplan

  apply:
    name: Apply
    needs: plan
    runs-on: ubuntu-latest

    environment: ${{ format('{0}-{1}', inputs.project, inputs.environment) }}

    defaults:
      run:
        shell: bash
        working-directory: stacks/${{ inputs.project }}/${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: ${{ inputs.tf_version }}

      - name: Configure AWS Credentials
        uses: aws-actions/configure-aws-credentials@v4
        with:
          aws-region: ${{ inputs.aws_region }}
          role-to-assume: ${{ inputs.role_arn }}

      - name: Terraform Init
        run: terraform init

      - name: Download Plan
        uses: actions/download-artifact@v4
        with:
          name: tfplan-${{ inputs.project }}-${{ inputs.environment }}
          path: stacks/${{ inputs.project }}/${{ inputs.environment }}

      - name: Terraform Apply
        run: terraform apply -auto-approve tfplan